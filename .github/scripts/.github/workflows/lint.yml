name: Count Arduino Files

on:
  push:
    branches:
      - main
      - dev
      - sensor-module
      - wireless-module

jobs:
  count-ino-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Count .ino Files
        run: python scripts/count_ino.py